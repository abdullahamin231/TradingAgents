<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TradingAgents</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-copy">
          <p class="eyebrow">TradingAgents</p>
          <h1>Run Analysis</h1>
        </div>
        <div class="topbar-meta">
          <span>Default date</span>
          <strong id="default-date">{{ today }}</strong>
        </div>
      </header>

      <section class="grid">
        <article class="panel composer">
          <div class="panel-head">
            <p class="panel-kicker">Config</p>
            <h2>Batch run</h2>
          </div>
          <div class="shared-controls">
            <label class="field">
              <span class="field-label">Date</span>
              <input
                id="shared-date"
                class="shared-date-input"
                type="text"
                inputmode="numeric"
                spellcheck="false"
                placeholder="YYYY-MM-DD"
                value="{{ today }}"
              />
            </label>
          </div>
          <div id="run-rows" class="run-rows"></div>
          <div class="composer-actions">
            <button id="add-row" class="icon-button" type="button" aria-label="Add symbol">Add symbol</button>
            <button id="submit-runs" class="primary-button" type="button">Run analysis</button>
          </div>
          <p id="composer-message" class="composer-message" aria-live="polite"></p>
        </article>

        <article class="panel jobs">
          <div class="panel-head">
            <p class="panel-kicker">Queue</p>
            <h2>Recent jobs</h2>
          </div>
          <div id="jobs-list" class="jobs-list empty-state">No jobs yet.</div>
        </article>
      </section>

      <section class="grid lower-grid">
        <article class="panel browser">
          <div class="panel-head">
            <p class="panel-kicker">Reports</p>
            <h2>Saved reports</h2>
          </div>
          <div class="browser-toolbar">
            <select id="ticker-select">
              <option value="">Ticker</option>
            </select>
            <select id="report-select">
              <option value="">Trade date</option>
            </select>
          </div>
          <div id="ticker-summary" class="ticker-summary empty-state">Choose a ticker to list saved JSON logs.</div>
        </article>

        <article class="panel report">
          <div class="panel-head">
            <p class="panel-kicker">Rendered</p>
            <h2 id="report-title">No report selected</h2>
          </div>
          <div id="report-view" class="report-view empty-state">Select a ticker and report date to render the saved analysis.</div>
        </article>
      </section>
    </main>
    <script>
      window.TRADINGAGENTS_DEFAULT_DATE = "{{ today }}";
    </script>
    <script src="/static/app.js"></script>
  </body>
</html>
